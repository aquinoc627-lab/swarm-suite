# theHIVE — Docker Compose Configuration
# Orchestrates the entire stack: Backend, Frontend, and PostgreSQL

version: '3.8'

services:
  # Backend Service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: theHIVE-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://theHIVE_user:theHIVE_password@db:5432/theHIVE_db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - AUTH_MODE=jwt
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - theHIVE-network

  # Frontend Service (React + Nginx)
  frontend:
    build:
      context: ./theHIVE-frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    container_name: theHIVE-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - theHIVE-network

  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: theHIVE-db
    restart: always
    environment:
      - POSTGRES_USER=theHIVE_user
      - POSTGRES_PASSWORD=theHIVE_password
      - POSTGRES_DB=theHIVE_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theHIVE_user -d theHIVE_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - theHIVE-network

networks:
  theHIVE-network:
    driver: bridge

volumes:
  postgres_data:
