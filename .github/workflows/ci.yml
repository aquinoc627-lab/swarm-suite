name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          grep -v "^emergentintegrations" backend/requirements.txt > /tmp/ci-requirements.txt
          pip install -r /tmp/ci-requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/app/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        working-directory: backend
        run: pytest

      - name: Security audit
        run: |
          pip install pip-audit
copilot/remove-duplicate-imports-and-files
          pip-audit -r /tmp/ci-requirements.tx
          pip-audit -r backend/requirements.txt || true
 main

  frontend:
    name: Frontend (Node 24)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: autonomous-frontend
        run: npm ci

      - name: Build
        working-directory: autonomous-frontend
        run: npm run build
        env:
          CI: false

      - name: Security audit
        working-directory: autonomous-frontend
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Run tests
        working-directory: autonomous-frontend
        run: npm test -- --watchAll=false
        env:
          CI: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
